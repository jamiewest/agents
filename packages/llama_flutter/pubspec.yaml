name: llama_flutter
description: >-
  On-device LLM inference for iOS and macOS, backed by llama.cpp via a vendored
  xcframework, a Pigeon platform bridge, and a Dart worker isolate.
version: 0.1.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^26.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LlamaFlutterPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: LlamaFlutterPlugin
        sharedDarwinSource: true
