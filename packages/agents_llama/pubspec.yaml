name: agents_llama
description: Local GGUF chat clients for agents, backed by llama.cpp on native and wllama on web.
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  agents:
    path: ../agents
  extensions: ^0.5.0
  flutter:
    sdk: flutter
  llama_flutter:
    path: ../llama_flutter
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - lib/assets/wasm/
