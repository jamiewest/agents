name: agents_flutter_example
description: Demonstrates the agents_flutter chat UI.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.0

dependencies:
  agents:
    path: ../../agents
  agents_flutter:
    path: ..
  cupertino_icons: ^1.0.8
  extensions: ^0.3.28
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0

dependency_overrides:
  agents:
    path: ../../agents

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
