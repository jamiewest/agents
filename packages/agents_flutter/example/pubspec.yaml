name: agents_flutter_example
description: Demonstrates the agents_flutter chat UI.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.0

dependencies:
  agents:
    path: ../../agents
  agents_flutter:
    path: ..
  anthropic_sdk_dart: ^5.0.0
  cupertino_icons: ^1.0.8
  extensions:
    path: ../../../../extensions/packages/extensions
  extensions_flutter:
    path: ../../../../extensions/packages/extensions_flutter
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  google_fonts: ^8.1.0

dependency_overrides:
  agents:
    path: ../../agents
  extensions:
    path: ../../../../extensions/packages/extensions
  extensions_flutter:
    path: ../../../../extensions/packages/extensions_flutter

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
