name: agents_flutter
description: >-
  Flutter device-capability context providers and tools for the agents
  package, feeding signals such as date and connectivity to an agent through
  the AIContextProvider interface.
version: 0.0.1
repository: https://github.com/jamiewest/agents
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  a2a: ^4.2.0
  agents: ^1.2.0
  anthropic_sdk_dart: ^5.0.0
  background_downloader: ^9.5.5
  clock: ^1.1.2
  connectivity_plus: ^7.1.1
  cross_file: ^0.3.5+2
  crypto: ^3.0.7
  device_info_plus: ^13.2.0
  extensions: ^0.5.0
  extensions_flutter: ^0.4.6
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_context_menu: ^0.4.2
  flutter_markdown_plus: ^1.0.7
  flutter_picture_taker: ^0.2.0
  flutter_secure_storage: ^10.3.1
  flutter_timezone: ^5.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.3
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  mime: ^2.0.0
  network_info_plus: ^8.1.0
  package_info_plus: ^10.2.0
  path_provider: ^2.1.6
  sembast: ^3.8.9+1
  sembast_web: ^2.4.5+1
  shared_preferences: ^2.5.5
  timezone: ^0.11.0
  universal_platform: ^1.1.0
  url_launcher: ^6.3.2
  wakelock_plus: ^1.6.1
  waveform_recorder: ^1.8.0

dev_dependencies:
  file: ^7.0.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

