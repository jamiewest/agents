name: agents
description: >-
  Dart port of the Microsoft Agents AI framework. Build, compose, and
  orchestrate AI agents backed by any ChatClient — with sessions, streaming,
  tool use, compaction, evaluation, and middleware pipelines.
version: 1.4.0
repository: https://github.com/jamiewest/agents

environment:
  sdk: ^3.11.5

# Add regular dependencies here.
dependencies:
  a2a: ^4.2.0
  clock: ^1.1.1
  extensions: ^0.3.28
  file: ^7.0.1
  opentelemetry: ^0.18.10
  path: ^1.9.0
  pool: ^1.5.1
  shelf: ^1.4.0
  shelf_router: ^1.1.0

dev_dependencies:
  fake_async: ^1.3.3
  lints: ^6.0.0
  test: ^1.25.6
